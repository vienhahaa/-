<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>東京 & 伊豆奢華溫泉 5日4夜行程 (高清路線優化版)</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --bg-color: #f7f9fa;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --border-color: #eaeaea;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            padding-bottom: 90px;
        }

        .header-banner {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 35px 20px 25px 20px;
            text-align: center;
            position: relative;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .edit-toggle-btn {
            position: absolute; top: 12px; right: 12px;
            background-color: rgba(255, 255, 255, 0.25); border: 1.5px solid white;
            color: white; padding: 6px 14px; border-radius: 20px;
            font-size: 10pt; font-weight: bold; cursor: pointer; z-index: 1001;
        }
        .edit-toggle-btn.editing { background-color: #e74c3c; border-color: #e74c3c; }

        .header-banner h1 { font-size: 18pt; font-weight: 700; margin-bottom: 5px; }
        .header-banner p { font-size: 10.5pt; opacity: 0.9; }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .page-view { display: none; }
        .page-view.active { display: block; }

        body.is-editing-mode .editable {
            outline: 2px dashed #3498db !important; background-color: #fffdec !important;
            padding: 2px 4px; border-radius: 4px; display: inline-block; min-width: 30px;
        }

        .delete-item-btn {
            display: none; position: absolute; top: 10px; right: 10px;
            background: #e74c3c; color: white; border: none; width: 22px; height: 22px;
            border-radius: 50%; font-weight: bold; font-size: 10pt; line-height: 22px; text-align: center; cursor: pointer;
            z-index: 10;
        }
        body.is-editing-mode .delete-item-btn { display: block; }
        body.is-editing-mode .chevron-icon { display: none; }

        .add-item-btn {
            display: block; width: 100%; padding: 12px; background: #3498db; color: white;
            border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; margin-bottom: 20px; cursor: pointer;
            box-shadow: 0 2px 5px rgba(52, 152, 219, 0.3);
        }

        .day-tabs {
            display: table; width: 100%; table-layout: fixed; margin-bottom: 15px;
            background: #fff; border-radius: 10px; padding: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .day-tab {
            display: table-cell; text-align: center; padding: 10px 0;
            font-size: 11pt; font-weight: bold; color: var(--text-muted); cursor: pointer; border-radius: 7px;
        }
        .day-tab.active { background-color: var(--primary); color: white; }
        
        .day-content { display: none; }
        .day-content.active { display: block; }

        .timeline-item {
            position: relative; background: var(--card-bg); border-radius: 12px;
            padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border-left: 5px solid var(--primary);
        }
        .timeline-item.transport { border-left-color: #3498db; background-color: #f0f7fc; }
        .timeline-item.hotel { border-left-color: #f1c40f; background-color: #fffdf3; }
        .timeline-item.food { border-left-color: #e74c3c; background-color: #fffbfb; }
        .timeline-item.clickable { cursor: pointer; }

        .chevron-icon { float: right; color: var(--text-muted); font-weight: bold; font-size: 11pt; margin-left: 5px; }

        .collapsible-content { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #cbd5e1; }
        .timeline-item.open .collapsible-content { display: block; }
        body.is-editing-mode .collapsible-content { display: block !important; }

        .sub-info-box { background-color: rgba(255, 255, 255, 0.9); border: 1px solid #cbd5e1; border-radius: 8px; padding: 12px; margin-bottom: 12px; font-size: 10pt; color: #334155; }
        
        /* 1,2,3 新增相片樣式 */
        .inserted-photo { width: 100%; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); margin-top: 10px; display: block; }

        .time-badge { font-size: 9pt; font-weight: bold; background: #edf2f7; padding: 3px 8px; border-radius: 20px; color: var(--primary); display: inline-block; margin-bottom: 8px; }
        .item-title { font-size: 12.5pt; font-weight: bold; color: #1a202c; margin-bottom: 5px; }
        .item-desc { font-size: 10pt; color: #4a5568; }
        
        h2 { font-size: 14pt; margin: 15px 0 10px 0; color: var(--primary); border-bottom: 2px solid var(--border-color); padding-bottom: 5px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 10pt; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: #f8f9fa; }
        .pack-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-color); font-size: 11pt; }
        .pack-item input { margin-right: 12px; width: 18px; height: 18px; }
        .pack-item.checked { color: #a0aec0; text-decoration: line-through; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 65px;
            background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color); display: table; width: 100%; table-layout: fixed; z-index: 1000;
        }
        .nav-item { display: table-cell; text-align: center; vertical-align: middle; color: var(--text-muted); text-decoration: none; font-size: 9pt; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-item svg { display: block; margin: 0 auto 3px auto; width: 22px; height: 22px; fill: currentColor; }

        /* 縮放外層容器樣式 */
        .zoom-container {
            overflow: hidden;
            border-radius: 8px;
            margin-top: 10px;
            background: #f8f9fa;
            border: 1px solid #e2e8f0;
            max-height: 400px;
            transition: max-height 0.3s ease;
        }
        .zoom-container.expanded {
            max-height: 2000px;
        }
    </style>
</head>
<body>

    <div class="header-banner">
        <button class="edit-toggle-btn" id="edit-btn" onclick="toggleEditMode()">🔓 編輯行程</button>
        <h1><span class="editable" id="lbl-main-title">東京 & 伊豆奢華溫泉 5日4夜行程</span></h1>
        <p><span class="editable" id="lbl-sub-title">📅 高清路線優化版</span></p>
    </div>

    <div class="container">
        
        <div id="view-itinerary" class="page-view active">
            <div class="day-tabs">
                <div class="day-tab active" onclick="switchDay(1)">D1</div>
                <div class="day-tab" onclick="switchDay(2)">D2</div>
                <div class="day-tab" onclick="switchDay(3)">D3</div>
                <div class="day-tab" onclick="switchDay(4)">D4</div>
                <div class="day-tab" onclick="switchDay(5)">D5</div>
            </div>

            <div id="itinerary-container"></div>
            
            <button class="add-item-btn" onclick="addNewTimelineItem()">➕ 新增行程項目</button>
        </div>

        <div id="view-logistics" class="page-view">
            <h2>住宿與重要交通詳情</h2>
            <div class="card"><div class="editable" id="card-hotel-info">這裡可以填寫你的交通及酒店詳細備忘錄。</div></div>
        </div>

        <div id="view-packing" class="page-view">
            <h2>行前準備檢查清單</h2>
            <div class="card" id="packing-container"></div>
        </div>

        <div id="view-budget" class="page-view">
            <h2>預算估計花費</h2>
            <div class="card">
                <table>
                    <thead>
                        <tr><th>項目</th><th style="width:100px;">估計金額 (HKD)</th></tr>
                    </thead>
                    <tbody id="budget-table-body"></tbody>
                    <tfoot>
                        <tr style="background:#f1f5f9; font-weight:bold;">
                            <td>總計開支 (每人)</td>
                            <td id="budget-total-sum">$0</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

    </div>

    <nav class="bottom-nav">
        <a class="nav-item active" id="nav-itinerary" onclick="showPage('itinerary')"><svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>每日行程</a>
        <a class="nav-item" id="nav-logistics" onclick="showPage('logistics')"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>交通住宿</a>
        <a class="nav-item" id="nav-packing" onclick="showPage('packing')"><svg viewBox="0 0 24 24"><path d="M17 6h-2V3c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v3H5c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM9 3h4v3H9V3zm10 16H5V8h14v11z"/></svg>行李準備</a>
        <a class="nav-item" id="nav-budget" onclick="showPage('budget')"><svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1 0 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2-.9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>預算花費</a>
    </nav>

    <script>
        let isEditMode = false;
        let currentDay = 1;

        // 預設行程資料
        const defaultItinerary = [
            { id: "item-1", day: 1, type: "transport", time: "09:15 - 14:45", title: "✈️ 香港快運 UO 848 啟程", desc: "成田機場往淺草酒店交通及報到", hasNotes: true },
            { id: "item-2", day: 1, type: "transport", time: "16:06 - 17:15", title: "🚆 京成電鐵 Access 特快", desc: "直達「淺草站」無需轉車。車費約 1,310 JPY。", hasNotes: true },
            { id: "item-3", day: 1, type: "hotel", time: "17:45", title: "🏨 The Kanzashi Tokyo Asakusa 入住", desc: "辦理 Check-in 手續及安放行李。", hasNotes: true },
            { id: "item-4", day: 1, type: "food", time: "18:30 - 20:30", title: "🍲 淺草今半別館 (壽喜燒)", desc: "品嚐頂級黑毛和牛壽喜燒。", hasNotes: false },
            { id: "item-5", day: 2, type: "normal", time: "09:30", title: "⛩️ 淺草雷門 & 仲見世通", desc: "早晨漫步，拍照打卡。", hasNotes: false },
            { id: "item-6", day: 3, type: "hotel", time: "14:00", title: "♨️ 吉祥CAREN 入住", desc: "享受無敵海景露天溫泉。", hasNotes: false },
            { id: "item-7", day: 4, type: "normal", time: "10:00", title: "⛰️ 大室山", desc: "搭乘吊椅欣賞抹茶山美景。", hasNotes: false },
            { id: "item-8", day: 5, type: "transport", time: "19:45", title: "✈️ UO 647 返港", desc: "完美結束行程！", hasNotes: false }
        ];

        const defaultPacking = [
            { text: "特區護照 (確保有6個月以上有效期)", checked: false },
            { text: "日圓現金 (建議準備 40,000 JPY)", checked: false },
            { text: "日本數據上網卡 / Wi-Fi 蛋", checked: false },
            { text: "手機 Suica 卡 / 實體西瓜卡", checked: false },
            { text: "換洗衣物、舒適行街鞋", checked: false }
        ];

        const defaultBudget = [
            { name: "Day 1 交通及壽喜燒", cost: 858 },
            { name: "Day 2 市區行街買野", cost: 420 },
            { name: "Day 3 踴子號特急車票", cost: 447 },
            { name: "藥妝手信預備金", cost: 1053 },
            { name: "其餘雜項開支", cost: 764 }
        ];

        let itineraryData = JSON.parse(localStorage.getItem('mix_itinerary')) || defaultItinerary;
        let packingData = JSON.parse(localStorage.getItem('mix_packing')) || defaultPacking;
        let budgetData = JSON.parse(localStorage.getItem('mix_budget')) || defaultBudget;

        function showPage(pageId) {
            if (isEditMode) return;
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById('view-' + pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function switchDay(dayNum) {
            if (isEditMode) return;
            currentDay = dayNum;
            document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderItinerary();
        }

        function toggleAccordion(event, itemId) {
            if (isEditMode) return;
            
            // 如果點選到圖片或圖片容器，不觸發收合
            if (event.target.tagName === 'IMG' || event.target.classList.contains('zoom-container')) {
                return;
            }
            
            const itemElement = document.getElementById(itemId);
            if (!itemElement.querySelector('.collapsible-content')) return;
            itemElement.classList.toggle('open');
            const chevron = itemElement.querySelector('.chevron-icon');
            if (chevron) {
                chevron.innerText = itemElement.classList.contains('open') ? '▼' : '▶';
            }
        }

        function renderItinerary() {
            const container = document.getElementById('itinerary-container');
            container.innerHTML = '';
            const filtered = itineraryData.filter(item => item.day === currentDay);
            
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = `timeline-item ${item.type} ${item.hasNotes ? 'clickable' : ''}`;
                div.id = item.id;
                div.setAttribute('onclick', `toggleAccordion(event, '${item.id}')`);
                
                let notesHTML = '';
                if (item.hasNotes) {
                    if (item.id === "item-1") {
                        // 1) 機場到市區交通指南 下方加相 (已嵌入您的實體高清圖，支援點擊無縫縮放)

        function addNewTimelineItem() {
            const newId = 'item-' + Date.now();
            itineraryData.push({
                id: newId, day: currentDay, type: 'normal', time: '12:00', title: '新行程項目', desc: '請輸入行程描述', hasNotes: false
            });
            localStorage.setItem('mix_itinerary', JSON.stringify(itineraryData));
            renderItinerary();
            if (isEditMode) makeElementsEditable(true);
        }

        function deleteTimelineItem(event, itemId) {
            event.stopPropagation();
            if(!confirm('確定要刪除此行程項目嗎？')) return;
            itineraryData = itineraryData.filter(item => item.id !== itemId);
            localStorage.setItem('mix_itinerary', JSON.stringify(itineraryData));
            renderItinerary();
            makeElementsEditable(true);
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('edit-btn');
            if (isEditMode) {
                btn.innerText = '💾 保存行程';
                btn.classList.add('editing');
                document.body.classList.add('is-editing-mode');
                makeElementsEditable(true);
            } else {
                btn.innerText = '🔓 編輯行程';
                btn.classList.remove('editing');
                document.body.classList.remove('is-editing-mode');
                saveAllEdits();
                makeElementsEditable(false);
                renderItinerary();
            }
        }

        function makeElementsEditable(editable) {
            document.querySelectorAll('.editable').forEach(el => {
                el.contentEditable = editable ? "true" : "false";
            });
        }

        function saveAllEdits() {
            itineraryData.forEach(item => {
                const timeEl = document.getElementById(`time-${item.id}`);
                const titleEl = document.getElementById(`title-${item.id}`);
                const descEl = document.getElementById(`desc-${item.id}`);
                
                if (timeEl) item.time = timeEl.innerText;
                if (titleEl) item.title = titleEl.innerText;
                if (descEl) item.desc = descEl.innerText;

                if (item.hasNotes) {
                    const note1 = document.getElementById(`note1-${item.id}`);
                    if (note1) localStorage.setItem('final_save_note1-' + item.id, note1.innerHTML);
                    const note2 = document.getElementById(`note2-${item.id}`);
                    if (note2) localStorage.setItem('final_save_note2-' + item.id, note2.innerHTML);
                    const note3 = document.getElementById(`note3-${item.id}`);
                    if (note3) localStorage.setItem('final_save_note3-' + item.id, note3.innerHTML);
                }
            });
            localStorage.setItem('mix_itinerary', JSON.stringify(itineraryData));

            const mainTitle = document.getElementById('lbl-main-title');
            const subTitle = document.getElementById('lbl-sub-title');
            if (mainTitle) localStorage.setItem('final_save_lbl-main-title', mainTitle.innerHTML);
            if (subTitle) localStorage.setItem('final_save_lbl-sub-title', subTitle.innerHTML);
            
            alert('所有修改已成功保存！');
        }

        function renderPacking() {
            const container = document.getElementById('packing-container');
            if(!container) return;
            container.innerHTML = '';
            packingData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `pack-item ${item.checked ? 'checked' : ''}`;
                div.innerHTML = `
                    <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="togglePackItem(${index})">
                    <span class="editable" id="pack-text-${index}" onblur="savePackingText(${index})">${item.text}</span>
                `;
                container.appendChild(div);
            });
        }

        function togglePackItem(index) {
            packingData[index].checked = !packingData[index].checked;
            localStorage.setItem('mix_packing', JSON.stringify(packingData));
            renderPacking();
        }

        function savePackingText(index) {
            const el = document.getElementById(`pack-text-${index}`);
            if (el) {
                packingData[index].text = el.innerText;
                localStorage.setItem('mix_packing', JSON.stringify(packingData));
            }
        }

        function renderBudget() {
            const tbody = document.getElementById('budget-table-body');
            if(!tbody) return;
            tbody.innerHTML = '';
            let total = 0;
            budgetData.forEach((item, index) => {
                total += item.cost;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="editable" id="budget-name-${index}" onblur="saveBudgetItem(${index})">${item.name}</span></td>
                    <td>$<span class="editable" id="budget-cost-${index}" onblur="saveBudgetItem(${index})">${item.cost}</span></td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('budget-total-sum').innerText = `$${total}`;
        }

        function saveBudgetItem(index) {
            const nameEl = document.getElementById(`budget-name-${index}`);
            const costEl = document.getElementById(`budget-cost-${index}`);
            if (nameEl) budgetData[index].name = nameEl.innerText;
            if (costEl) budgetData[index].cost = parseFloat(costEl.innerText) || 0;
            localStorage.setItem('mix_budget', JSON.stringify(budgetData));
            renderBudget();
        }

        function toggleZoom(imgElement, event) {
            event.stopPropagation(); // 阻止事件冒泡到外層卡片
            const container = imgElement.parentElement;
            
            if (imgElement.style.transform === 'scale(2.5)') {
                imgElement.style.transform = 'scale(1)';
                imgElement.style.cursor = 'zoom-in';
                container.classList.remove('expanded');
                container.style.overflow = 'hidden';
            } else {
                imgElement.style.transform = 'scale(2.5)';
                imgElement.style.transformOrigin = 'left top'; // 從左上角開始放大
                imgElement.style.cursor = 'zoom-out';
                container.classList.add('expanded');
                container.style.overflow = 'auto'; // 允許滾動查看高清文字
            }
        }

        window.onload = function() {
            ['lbl-main-title', 'lbl-sub-title'].forEach(id => {
                const saved = localStorage.getItem('final_save_' + id);
                if(saved) document.getElementById(id).innerHTML = saved;
            });
            
            renderItinerary(); renderPacking(); renderBudget();
        }
    </script>
</body>
</html>
